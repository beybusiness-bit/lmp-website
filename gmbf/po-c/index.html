<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>게으러서 못열뻔한 플리마켓</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--c);
  transition: background-color 1s ease;
  display: flex; justify-content: center;
  min-height: 100vh; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
}
#app { width: 100%; max-width: 430px; min-height: 100vh; position: relative; overflow: hidden; }
:root { --c: #00CE6B; --prep-bg: #FFF100; --fill-color: #F95548; --menu-bg: #0BC6FF; }

/* ── 디자인 시스템 ── */
.btn {
  display: block; width: 100%; background: transparent;
  border: 2px solid #000; border-radius: 0; color: #000;
  font-size: 15px; font-weight: 700; padding: 12px 0;
  cursor: pointer; font-family: inherit; letter-spacing: -0.3px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s;
}
.btn:hover, .btn:active { background: #000; color: var(--btn-ctx, #fff); }
.box { border: 2px solid #000; background: transparent; }
.inp {
  width: 100%; background: transparent !important;
  border: none; border-bottom: 2px solid #000;
  color: #000; font-size: 17px; font-weight: 600;
  padding: 8px 0; outline: none;
  font-family: inherit; letter-spacing: 1px;
  -webkit-appearance: none; appearance: none; border-radius: 0; box-shadow: none !important;
}
.inp::placeholder { color: rgba(0,0,0,0.35); font-weight: 400; letter-spacing: 0; }
.inp:focus { background: transparent !important; outline: none; box-shadow: none !important; }
.inp:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px transparent inset !important; }

/* ── 슬라이드쇼 ── */
.slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 2s ease-in-out; }
.slide.on { opacity: 1; }
.slide::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.38); }

/* ── 메인 콘텐츠 ── */
#main-content {
  position: relative; z-index: 10; min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 80px 32px 100px;
}
.top-group { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
.bottom-group { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.edition-text { font-size: 18px; font-weight: 900; color: var(--c); letter-spacing: -0.3px; transition: color 1s ease; margin-bottom: -14px; }
.logo-wrap { width: 76%; max-width: 300px; }
.logo-mask {
  width: 100%; aspect-ratio: 835 / 700; background-color: var(--c);
  -webkit-mask-image: url(../assets/logo.png); mask-image: url(../assets/logo.png);
  -webkit-mask-size: contain; mask-size: contain;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  transition: background-color 1s ease;
}
.logo-fallback { font-size: 20px; font-weight: 900; color: var(--c); text-align: center; line-height: 1.3; transition: color 1s ease; display: none; }
.dday-num { font-size: 32px; font-weight: 300; color: var(--c); line-height: 1; letter-spacing: -1px; transition: color 1s ease; text-align: center; }
.visitor-line { font-size: 21px; font-weight: 400; color: var(--c); line-height: 1; letter-spacing: -0.5px; transition: color 1s ease; text-align: center; }
.basket-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.basket-btn:active { opacity: 0.75; transform: scale(0.97); }
.basket-mask {
  width: 72px; height: 72px; background-color: var(--c);
  -webkit-mask-image: url(../assets/basket.png); mask-image: url(../assets/basket.png);
  -webkit-mask-size: contain; mask-size: contain;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  transition: background-color 1s ease;
}
.basket-text { font-size: 18px; font-weight: 900; color: var(--c); letter-spacing: -0.3px; transition: color 1s ease; }

/* ── 관리자 링크 ── */
#admin-link {
  position: absolute; bottom: 16px; right: 20px; z-index: 20;
  font-size: 11px; color: rgba(255,255,255,0.4); cursor: pointer;
  -webkit-tap-highlight-color: transparent; padding: 8px;
}

/* ── 세션 복귀 버튼 ── */
#return-btn {
  display: none; position: absolute; bottom: 100px; right: 24px; z-index: 30;
  width: 44px; height: 44px; align-items: center; justify-content: center;
  font-size: 20px; color: #000; font-weight: 900;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  border: 2px solid #000; transition: opacity 0.2s;
}
#return-btn:active { opacity: 0.65; }

/* ── 공통 풀스크린 ── */
.fullscreen {
  position: fixed; top: 0; bottom: 0;
  left: 50%; width: 100%; max-width: 430px;
  transform: translateX(-50%) translateY(100%);
  transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex; flex-direction: column; overflow: hidden;
}
.fullscreen.open { transform: translateX(-50%) translateY(0); }

/* z-index 레이어 */
#prep-screen   { z-index: 50; background: var(--prep-bg); }
#guide-screen  { z-index: 60; background: #fff; }
#admin-screen  { z-index: 70; background: #fff; }

/* ── 공통 탑바 ── */
.topbar {
  flex-shrink: 0; display: flex; align-items: center;
  padding: 14px 20px; border-bottom: 2px solid #000;
}
#prep-topbar  { background: var(--prep-bg); }
#guide-topbar { background: #fff; }
#admin-topbar { background: #fff; }
.topbar-left {
  display: flex; align-items: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.basket-icon-wrap { width: 32px; height: 32px; position: relative; }
.basket-layer {
  position: absolute; inset: 0;
  -webkit-mask-image: url(../assets/basket.png); mask-image: url(../assets/basket.png);
  -webkit-mask-size: contain; mask-size: contain;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
}
.basket-layer-black { background: #000; }
.topbar-center { flex: 1; text-align: center; font-size: 15px; font-weight: 800; color: #000; letter-spacing: -0.3px; }
.topbar-right { font-size: 22px; color: #000; cursor: pointer; -webkit-tap-highlight-color: transparent; flex-shrink: 0; line-height: 1; padding: 4px; }
.topbar-back { font-size: 22px; font-weight: 900; color: #000; cursor: pointer; -webkit-tap-highlight-color: transparent; flex-shrink: 0; padding: 4px; line-height: 1; }

/* ── 공통 스크롤 바디 ── */
.screen-body { flex: 1; overflow-y: auto; padding: 24px 20px 48px; -webkit-overflow-scrolling: touch; }

/* ── 단계 카드 ── */
.stage-card {
  border: 2px solid #000; background: transparent; margin-bottom: 16px;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s;
}
.stage-card:active { opacity: 0.65; }
.stage-card-body { display: flex; align-items: center; gap: 14px; padding: 18px 16px 14px; }
.status-dot {
  width: 42px; height: 42px; border-radius: 50%;
  background: #000; color: var(--prep-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; flex-shrink: 0; text-align: center; line-height: 1.3;
}
.stage-title { font-size: 15px; font-weight: 800; color: #000; letter-spacing: -0.3px; line-height: 1.35; }
.stage-pbar { height: 10px; background: transparent; }
.stage-pbar-fill { height: 100%; background: #000; display: flex; align-items: center; justify-content: flex-end; }
.stage-pct-txt { font-size: 8px; font-weight: 800; color: var(--prep-bg); padding-right: 4px; white-space: nowrap; }

/* ── 사이드 메뉴 ── */
#side-menu {
  position: absolute; inset: 0; background: var(--menu-bg);
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 20; display: flex; flex-direction: column;
}
#side-menu.open { transform: translateX(0); }
.menu-header {
  flex-shrink: 0; display: flex; justify-content: flex-end;
  padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.12);
}
.menu-close { font-size: 24px; color: #000; cursor: pointer; -webkit-tap-highlight-color: transparent; padding: 4px 4px 4px 16px; line-height: 1; }
#menu-list { flex: 1; overflow-y: auto; padding: 8px 28px 40px; }
.menu-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 0; border-bottom: 1px solid rgba(0,0,0,0.18);
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { opacity: 0.6; }
.menu-dot {
  width: 36px; height: 36px; border-radius: 50%;
  background: #000; color: var(--menu-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; flex-shrink: 0; text-align: center; line-height: 1.3;
}
.menu-title { font-size: 16px; font-weight: 800; color: #000; letter-spacing: -0.3px; }

/* ── 가이드 뷰어 ── */
.guide-scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.guide-slide-body { flex: 1; position: relative; overflow: hidden; }
.guide-slide-track {
  display: flex; height: 100%;
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
}
.guide-slide-item { flex-shrink: 0; height: 100%; overflow-y: auto; }
.guide-dots {
  position: absolute; bottom: 16px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 8px; z-index: 5; pointer-events: none;
}
.guide-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(0,0,0,0.25); transition: background 0.2s; pointer-events: all; cursor: pointer;
}
.guide-dot.on { background: #000; }

/* 가이드 블록 */
.g-block-text { padding: 24px 20px; }
.g-block-text-inner { font-size: 15px; line-height: 1.7; color: #000; max-height: 65vh; overflow-y: auto; }
.g-block-image img { width: 100%; display: block; }
.g-block-mixed-overlay { position: relative; min-height: 260px; }
.g-block-mixed-overlay img { width: 100%; display: block; min-height: 260px; object-fit: cover; }
.g-overlay-text {
  position: absolute; inset: 0; display: flex; align-items: flex-end;
  background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 60%);
  padding: 20px;
}
.g-overlay-text-inner { color: #fff; font-size: 15px; line-height: 1.6; max-height: 45vh; overflow-y: auto; }
.g-block-mixed-split { display: flex; flex-direction: column; }
.g-split-img img { width: 100%; display: block; max-height: 260px; object-fit: cover; }
.g-split-text { padding: 16px 20px; border-top: 2px solid #000; font-size: 15px; line-height: 1.6; max-height: 160px; overflow-y: auto; }

/* 가이드 로딩/에러 */
.guide-empty { padding: 60px 20px; text-align: center; color: rgba(0,0,0,0.4); font-size: 14px; }

/* ── 관리자 화면 ── */
.guide-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 0; border-bottom: 2px solid #000;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.guide-list-item:active { opacity: 0.6; }
.guide-list-title { flex: 1; font-size: 15px; font-weight: 700; color: #000; }
.guide-list-badge { font-size: 10px; font-weight: 700; color: rgba(0,0,0,0.5); border: 1.5px solid rgba(0,0,0,0.3); padding: 2px 6px; white-space: nowrap; }
.guide-list-arrow { font-size: 18px; color: #000; }

/* 에디터 */
.editor-label { font-size: 11px; font-weight: 800; color: rgba(0,0,0,0.5); letter-spacing: 0.5px; margin-bottom: 8px; }
.editor-section { margin-bottom: 24px; }
.editor-inp {
  width: 100%; font-size: 16px; font-weight: 700; color: #000;
  border: none; border-bottom: 2px solid #000; background: transparent;
  padding: 8px 0; outline: none; font-family: inherit;
}
.type-toggle { display: flex; gap: 0; }
.type-toggle-btn {
  flex: 1; padding: 10px 0; background: transparent;
  border: 2px solid #000; border-right: none;
  font-size: 13px; font-weight: 700; color: #000;
  cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s;
}
.type-toggle-btn:last-child { border-right: 2px solid #000; }
.type-toggle-btn.on { background: #000; color: #fff; }

/* 블록 목록 */
.block-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0; border-bottom: 1.5px solid rgba(0,0,0,0.12);
}
.block-type-badge { font-size: 10px; font-weight: 800; color: rgba(0,0,0,0.5); border: 1.5px solid rgba(0,0,0,0.3); padding: 3px 6px; flex-shrink: 0; }
.block-preview { flex: 1; font-size: 13px; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.block-actions { display: flex; gap: 4px; flex-shrink: 0; }
.blk-btn {
  width: 30px; height: 30px; background: transparent; border: 1.5px solid #000;
  font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; font-family: inherit;
}
.blk-btn:active { background: #000; color: #fff; }

/* ── 블록 에디터 (풀스크린 모달) ── */
#block-modal {
  display: none; position: fixed; inset: 0; z-index: 200;
  flex-direction: column; background: #fff;
  left: 50%; width: 100%; max-width: 430px;
  transform: translateX(-50%);
}
#block-modal.on { display: flex; }
.block-modal-top {
  flex-shrink: 0; display: flex; align-items: center;
  padding: 14px 20px; border-bottom: 2px solid #000; background: #fff;
}
.block-modal-body { flex: 1; overflow-y: auto; padding: 20px 20px 40px; }

/* 블록 타입 탭 */
.blk-tabs { display: flex; margin-bottom: 20px; }
.blk-tab {
  flex: 1; padding: 10px 0; background: transparent;
  border: 2px solid #000; border-right: none;
  font-size: 13px; font-weight: 700; color: #000;
  cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s;
}
.blk-tab:last-child { border-right: 2px solid #000; }
.blk-tab.on { background: #000; color: #fff; }

/* 포맷팅 툴바 */
.fmt-bar {
  display: flex; flex-wrap: wrap; gap: 5px;
  padding-bottom: 12px; margin-bottom: 12px;
  border-bottom: 1.5px solid rgba(0,0,0,0.12);
}
.fmt-btn {
  padding: 5px 9px; background: transparent;
  border: 1.5px solid rgba(0,0,0,0.35); font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: inherit; color: #000; min-width: 32px; text-align: center;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.fmt-btn:active { background: #000; color: #fff; }

/* contenteditable */
.ced {
  min-height: 160px; max-height: 280px; overflow-y: auto;
  border: 2px solid #000; padding: 12px;
  font-size: 15px; line-height: 1.7; color: #000;
  outline: none; font-family: inherit;
}
.ced:empty::before { content: attr(data-ph); color: rgba(0,0,0,0.3); pointer-events: none; }

/* 이미지 URL */
.img-inp {
  width: 100%; background: transparent; border: none; border-bottom: 2px solid #000;
  color: #000; font-size: 14px; padding: 8px 0; outline: none; font-family: inherit;
  margin-bottom: 12px;
}
.img-prev { width: 100%; max-height: 180px; object-fit: cover; display: none; border: 2px solid #000; margin-bottom: 12px; }

/* 혼합형 레이아웃 */
.mixed-layout-row { display: flex; gap: 8px; margin-bottom: 16px; }
.mixed-layout-btn {
  flex: 1; padding: 10px 6px; background: transparent;
  border: 2px solid #000; font-size: 11px; font-weight: 700; line-height: 1.4;
  cursor: pointer; font-family: inherit; color: #000; text-align: center;
  -webkit-tap-highlight-color: transparent; transition: background 0.15s, color 0.15s;
}
.mixed-layout-btn.on { background: #000; color: #fff; }

/* ── 모달 ── */
.modal-ov {
  display: none; position: fixed; inset: 0; z-index: 300;
  justify-content: center; align-items: center;
  background: rgba(0,0,0,0.42);
}
.modal-ov.on { display: flex; }
.modal-box { width: 82%; max-width: 340px; padding: 36px 28px 28px; color: #000; font-family: inherit; }
.modal-ttl { font-size: 20px; font-weight: 900; color: #000; margin-bottom: 10px; line-height: 1.3; letter-spacing: -0.5px; }
.modal-desc { font-size: 14px; color: rgba(0,0,0,0.7); margin-bottom: 24px; line-height: 1.6; }
.modal-err { font-size: 13px; color: rgba(0,0,0,0.7); margin-bottom: 14px; min-height: 16px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btn {
  flex: 1; padding: 12px 0; background: transparent;
  border: 2px solid #000; color: #000;
  font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit; letter-spacing: -0.3px;
  -webkit-tap-highlight-color: transparent; transition: background 0.15s, color 0.15s;
}
.modal-btn:hover, .modal-btn:active { background: #000; color: var(--modal-bg, #fff); }

/* 관리자 에디터 헤더 행 */
.editor-header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
.save-btn { padding: 8px 16px; background: #000; border: none; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }
.del-btn { padding: 8px 12px; background: transparent; border: 2px solid #000; color: #000; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; display: none; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="app">

  <div class="slide on" id="slide-0"></div>
  <div class="slide" id="slide-1"></div>
  <div class="slide" id="slide-2"></div>
  <div class="slide" id="slide-3"></div>
  <div class="slide" id="slide-4"></div>

  <div id="main-content">
    <div class="top-group">
      <div class="edition-text" id="edition-text">제3회</div>
      <div class="logo-wrap">
        <div class="logo-mask" id="logo-mask"></div>
        <div class="logo-fallback" id="logo-fallback">게으러서<br>못열뻔한<br>플리마켓</div>
      </div>
      <div class="dday-num" id="dday-num">D-?</div>
      <div class="visitor-line" id="visitor-line">0명 방문신청</div>
    </div>
    <div class="bottom-group basket-btn" onclick="openAuthModal()">
      <div class="basket-mask"></div>
      <div class="basket-text">내 마켓 준비하기</div>
    </div>
  </div>

  <div id="admin-link" onclick="openAdminModal()">관리자</div>
  <div id="return-btn" onclick="reopenPrep()">↑</div>

  <!-- ── 셀러 진행화면 ── -->
  <div id="prep-screen" class="fullscreen">
    <div id="side-menu">
      <div class="menu-header"><div class="menu-close" onclick="closeMenu()">✕</div></div>
      <div id="menu-list"></div>
    </div>
    <div id="prep-topbar" class="topbar">
      <div class="topbar-left" onclick="toggleMenu()">
        <div class="basket-icon-wrap"><div class="basket-layer basket-layer-black"></div></div>
      </div>
      <div class="topbar-center" id="topbar-title">내 마켓 준비</div>
      <div class="topbar-right" onclick="closePrep()">↓</div>
    </div>
    <div class="screen-body" id="prep-body">
      <div id="stage-list"></div>
    </div>
  </div>

  <!-- ── 가이드 뷰어 ── -->
  <div id="guide-screen" class="fullscreen">
    <div id="guide-topbar" class="topbar">
      <div class="topbar-back" onclick="closeGuide()">←</div>
      <div class="topbar-center" id="guide-title-bar">안내</div>
      <div style="width:30px;"></div>
    </div>
    <div id="guide-scroll-body" class="guide-scroll-body" style="display:none;">
      <div id="guide-scroll-blocks"></div>
    </div>
    <div id="guide-slide-body" class="guide-slide-body" style="display:none;">
      <div id="guide-slide-track" class="guide-slide-track"></div>
      <div id="guide-dots" class="guide-dots"></div>
    </div>
  </div>

  <!-- ── 관리자 화면 ── -->
  <div id="admin-screen" class="fullscreen">
    <div id="admin-topbar" class="topbar">
      <div style="width:30px;"></div>
      <div class="topbar-center">관리자</div>
      <div class="topbar-right" onclick="closeAdmin()">↓</div>
    </div>

    <!-- 안내 목록 -->
    <div id="admin-list-panel" class="screen-body">
      <div id="admin-guide-list"><div class="guide-empty">불러오는 중…</div></div>
      <button class="btn" style="margin-top:16px;" onclick="startNewGuide()">+ 안내 추가</button>
    </div>

    <!-- 안내 에디터 -->
    <div id="admin-editor-panel" class="screen-body" style="display:none;">
      <div class="editor-header-row">
        <div class="topbar-back" onclick="backToList()" style="font-size:18px;">←</div>
        <span style="font-size:12px;font-weight:800;color:rgba(0,0,0,0.45);">안내 편집</span>
        <div style="flex:1;"></div>

function calcDDay(d){
  const t=new Date(); t.setHours(0,0,0,0);
  const n=Math.ceil((new Date(d+'T00:00:00')-t)/86400000);
  return n>0?'D-'+n:n===0?'D-Day':'D+'+Math.abs(n);
}

}

/* ── 가이드 뷰어 ── */
let gSlideIdx=0, gSlideTotal=0, gTouchX=0;

async function openGuide(guideId, title){
  document.getElementById('guide-title-bar').textContent=title||'안내';
  document.getElementById('guide-scroll-body').style.display='none';
  document.getElementById('guide-slide-body').style.display='none';
  document.getElementById('guide-screen').classList.add('open');
  try{
    const doc=await db.collection('gmbf_guides').doc(guideId).get();
    if(!doc.exists){ showGuideEmpty('안내 내용이 아직 준비되지 않았어요.'); return; }
    const g=doc.data();
    const blocks=(g.blocks||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
    if(g.displayType==='slide') renderGuideSlide(blocks);
    else renderGuideScroll(blocks);
  }catch(e){ showGuideEmpty('불러오기에 실패했어요.'); }
}
function closeGuide(){ document.getElementById('guide-screen').classList.remove('open'); }
function showGuideEmpty(msg){
  document.getElementById('guide-scroll-blocks').innerHTML='<div class="guide-empty">'+msg+'</div>';
  document.getElementById('guide-scroll-body').style.display='block';
}

function blockHtml(b){
  if(b.type==='text')
    return '<div class="g-block-text"><div class="g-block-text-inner">'+(b.textContent||'')+'</div></div>';
  if(b.type==='image')
    return '<div class="g-block-image"><img src="'+(b.imageUrl||'')+'" alt="" loading="lazy"></div>';
  if(b.type==='mixed'){
    if(b.mixedLayout==='split')
      return '<div class="g-block-mixed-split"><div class="g-split-img"><img src="'+(b.imageUrl||'')+'" alt="" loading="lazy"></div><div class="g-split-text">'+(b.textContent||'')+'</div></div>';
    return '<div class="g-block-mixed-overlay"><img src="'+(b.imageUrl||'')+'" alt="" loading="lazy"><div class="g-overlay-text"><div class="g-overlay-text-inner">'+(b.textContent||'')+'</div></div></div>';
  }
  return '';
}
function renderGuideScroll(blocks){
  document.getElementById('guide-scroll-blocks').innerHTML=blocks.map(blockHtml).join('');
  document.getElementById('guide-scroll-body').style.display='block';
}
function renderGuideSlide(blocks){
  gSlideIdx=0; gSlideTotal=blocks.length;
  const track=document.getElementById('guide-slide-track');
  const N=blocks.length||1;
  track.innerHTML=blocks.map(b=>'<div class="guide-slide-item" style="width:'+(100/N)+'%">'+blockHtml(b)+'</div>').join('');
  track.style.width=(N*100)+'%';
  updateDots(); document.getElementById('guide-slide-body').style.display='block';
  const sb=document.getElementById('guide-slide-body');
  sb.ontouchstart=e=>{ gTouchX=e.touches[0].clientX; };
  sb.ontouchend  =e=>{ const dx=e.changedTouches[0].clientX-gTouchX; if(Math.abs(dx)>40) goSlide(gSlideIdx+(dx<0?1:-1)); };
}
function updateDots(){
  document.getElementById('guide-dots').innerHTML=Array.from({length:gSlideTotal},(_,i)=>
    '<div class="guide-dot'+(i===gSlideIdx?' on':'')+'" onclick="goSlide('+i+')"></div>').join('');
}
function goSlide(i){
  gSlideIdx=Math.max(0,Math.min(i,gSlideTotal-1));
  document.getElementById('guide-slide-track').style.transform='translateX('+(-gSlideIdx*(100/gSlideTotal))+'%)';
  updateDots();
}

  try{

    if(snap.empty){ list.innerHTML='<div class="guide-empty">아직 안내가 없어요.<br>아래 버튼으로 추가하세요.</div>'; return; }
    list.innerHTML=snap.docs.map(doc=>{
      const d=doc.data();
      return '<div class="guide-list-item" onclick="editGuide(\''+doc.id+'\')">'+
        '<div class="guide-list-title">'+(d.title||'(제목 없음)')+'</div>'+
        '<div class="guide-list-badge">'+(d.displayType==='slide'?'슬라이드':'스크롤')+'</div>'+
        '<div class="guide-list-badge" style="opacity:0.5;">'+doc.id+'</div>'+
        '<div class="guide-list-arrow">›</div></div>';
    }).join('');
  }catch(e){ list.innerHTML='<div class="guide-empty">불러오기 실패</div>'; }
}
function showPanel(which){
  document.getElementById('admin-list-panel').style.display=which==='list'?'block':'none';
  document.getElementById('admin-editor-panel').style.display=which==='editor'?'block':'none';
}
function backToList(){ showPanel('list'); curGuideId=null; curBlocks=[]; }

/* ── 가이드 에디터 ── */
let curGuideId=null, curBlocks=[], curDispType='scroll';

function startNewGuide(){
  curGuideId=null; curBlocks=[]; curDispType='scroll';
  document.getElementById('g-id').value='';
  document.getElementById('g-title').value='';
  document.getElementById('del-btn').style.display='none';
  setDispType('scroll'); renderBlockList(); showPanel('editor');
}
async function editGuide(docId){
  showPanel('editor');
  try{
    const doc=await db.collection('gmbf_guides').doc(docId).get();
    if(!doc.exists) return;
    const d=doc.data();
    curGuideId=docId; curBlocks=(d.blocks||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
    curDispType=d.displayType||'scroll';
    document.getElementById('g-id').value=docId;
    document.getElementById('g-title').value=d.title||'';
    document.getElementById('del-btn').style.display='block';
    setDispType(curDispType); renderBlockList();
  }catch(e){}
}
function setDispType(t){
  curDispType=t;
  document.getElementById('tog-scroll').classList.toggle('on',t==='scroll');
  document.getElementById('tog-slide').classList.toggle('on',t==='slide');
}
async function saveGuide(){
  const id=document.getElementById('g-id').value.trim();
  const title=document.getElementById('g-title').value.trim();
  if(!id){ alert('안내 ID를 입력해주세요.'); return; }
  if(!title){ alert('제목을 입력해주세요.'); return; }
  const blocks=curBlocks.map((b,i)=>({...b,order:i}));
  try{
    await db.collection('gmbf_guides').doc(id).set({title,displayType:curDispType,blocks,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    curGuideId=id; document.getElementById('del-btn').style.display='block';
    alert('저장했어요!'); loadGuideList();
  }catch(e){ alert('저장 실패: '+e.message); }
}
async function deleteGuide(){
  if(!curGuideId||!confirm('이 안내를 삭제할까요?')) return;
  try{ await db.collection('gmbf_guides').doc(curGuideId).delete(); backToList(); loadGuideList(); }
  catch(e){ alert('삭제 실패'); }
}
function renderBlockList(){
  const list=document.getElementById('block-list');
  if(!curBlocks.length){ list.innerHTML='<div style="padding:16px 0;color:rgba(0,0,0,0.4);font-size:13px;text-align:center;">블록이 없어요.</div>'; return; }
  list.innerHTML=curBlocks.map((b,i)=>{
    const tl=b.type==='text'?'텍스트':b.type==='image'?'이미지':'혼합';
    const pv=b.type==='text'?(b.textContent||'').replace(/<[^>]+>/g,'').slice(0,28):
             b.type==='image'?(b.imageUrl?'[이미지]':'(URL 없음)'):
             '['+(b.mixedLayout==='split'?'분리':'오버레이')+'] '+(b.textContent||'').replace(/<[^>]+>/g,'').slice(0,18);
    return '<div class="block-item">'+
      '<div class="block-type-badge">'+tl+'</div>'+
      '<div class="block-preview">'+(pv||'(내용 없음)')+'</div>'+
      '<div class="block-actions">'+
        (i>0?'<button class="blk-btn" onclick="mvBlk('+i+',-1)">↑</button>':'<div style="width:30px;"></div>')+
        (i<curBlocks.length-1?'<button class="blk-btn" onclick="mvBlk('+i+',1)">↓</button>':'<div style="width:30px;"></div>')+
        '<button class="blk-btn" onclick="openBlockModal('+i+')">✎</button>'+
        '<button class="blk-btn" onclick="rmBlk('+i+')">✕</button>'+
      '</div></div>';
  }).join('');
}
function mvBlk(i,d){ const j=i+d; if(j<0||j>=curBlocks.length) return; [curBlocks[i],curBlocks[j]]=[curBlocks[j],curBlocks[i]]; renderBlockList(); }
function rmBlk(i){ curBlocks.splice(i,1); renderBlockList(); }

/* ── 블록 에디터 ── */
let curBlkIdx=null, curBlkType='text', curMixedLayout='overlay';
let savedRange=null;

function saveRange(el){ const sel=window.getSelection(); if(sel.rangeCount) savedRange={el,range:sel.getRangeAt(0).cloneRange()}; }
function restoreRange(el){ if(savedRange&&savedRange.el===el){ const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange.range); } }

function openBlockModal(idx){
  curBlkIdx=idx;
  document.getElementById('blk-modal-title').textContent=idx===null?'블록 추가':'블록 편집';
  const b=idx!==null?curBlocks[idx]:{type:'text',textContent:'',imageUrl:'',mixedLayout:'overlay'};
  curBlkType=b.type||'text'; curMixedLayout=b.mixedLayout||'overlay';
  switchBlkTab(curBlkType);
  document.getElementById('ced-text').innerHTML=b.type==='text'?(b.textContent||''):'';
  document.getElementById('img-url').value=b.type==='image'?(b.imageUrl||''):'';
  document.getElementById('mixed-img-url').value=b.type==='mixed'?(b.imageUrl||''):'';
  document.getElementById('ced-mixed').innerHTML=b.type==='mixed'?(b.textContent||''):'';
  prevImg('img-prev',document.getElementById('img-url').value);
  prevImg('mixed-img-prev',document.getElementById('mixed-img-url').value);
  setMixedLayout(curMixedLayout);
  savedRange=null;
  document.getElementById('block-modal').classList.add('on');
}
function closeBlockModal(){ document.getElementById('block-modal').classList.remove('on'); }
function saveBlock(){
  let b={id:uid(),type:curBlkType};
  if(curBlkType==='text') b.textContent=document.getElementById('ced-text').innerHTML;
  else if(curBlkType==='image') b.imageUrl=document.getElementById('img-url').value.trim();
  else{ b.imageUrl=document.getElementById('mixed-img-url').value.trim(); b.textContent=document.getElementById('ced-mixed').innerHTML; b.mixedLayout=curMixedLayout; }
  if(curBlkIdx!==null) curBlocks[curBlkIdx]={...curBlocks[curBlkIdx],...b};
  else curBlocks.push(b);
  renderBlockList(); closeBlockModal();
}
function switchBlkTab(t){
  curBlkType=t;
  ['text','image','mixed'].forEach(k=>{
    document.getElementById('btab-'+k).classList.toggle('on',k===t);
    document.getElementById('bpanel-'+k).style.display=k===t?'block':'none';
  });
}
function setMixedLayout(l){
  curMixedLayout=l;
  document.getElementById('mlbtn-overlay').classList.toggle('on',l==='overlay');
  document.getElementById('mlbtn-split').classList.toggle('on',l==='split');
}

/* ── 텍스트 포맷팅 ── */
function getEd(ctx){ return document.getElementById(ctx==='text'?'ced-text':'ced-mixed'); }
function focusEd(ctx){ const ed=getEd(ctx); ed.focus(); restoreRange(ed); }
function fmtCmd(ctx,cmd){ focusEd(ctx); document.execCommand(cmd,false,null); }
function fmtSz(ctx,px){
  focusEd(ctx);
  document.execCommand('fontSize',false,'7');
  getEd(ctx).querySelectorAll('font[size="7"]').forEach(el=>{ el.removeAttribute('size'); el.style.fontSize=px+'px'; });
}
function fmtAlign(ctx,dir){ focusEd(ctx); document.execCommand('justify'+dir.charAt(0).toUpperCase()+dir.slice(1),false,null); }
function fmtClr(ctx,clr){ focusEd(ctx); document.execCommand('foreColor',false,clr); }
function prevImg(id,url){ const el=document.getElementById(id); if(url&&url.startsWith('http')){ el.src=url; el.style.display='block'; } else el.style.display='none'; }

/* ── 초기화 ── */
function checkLogo(){
  const img=new Image();
  img.onerror=()=>{ document.getElementById('logo-mask').style.display='none'; document.getElementById('logo-fallback').style.display='block'; };
  img.src='../assets/logo.png';
}
function init(){
  document.getElementById('edition-text').textContent='제'+EDITION_NUM+'회';
  document.getElementById('dday-num').textContent=calcDDay(EVENT_DATE);
  initSlides(); checkLogo();
  setCss('--c',nextColor()); setInterval(nextSlide,10000);
  fetchCount(); setInterval(fetchCount,60000);
  const saved=sessionStorage.getItem('sellerSession');
  if(saved){ prepBg=sessionStorage.getItem('prepBgColor')||KEY_COLORS[0]; showReturnBtn(); }
}
window.addEventListener('load',init);
</script>
</body>
</html>
