<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>게으러서 못열뻔한 플리마켓</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--c);
  transition: background-color 1s ease;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

#app {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* ── SLIDESHOW ── */
.slide {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 2s ease-in-out;
  will-change: opacity;
}
.slide.on { opacity: 1; }

/* 배경 사진 위 그라디언트 섀도우 (텍스트 가독성) */
.slide::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.65) 100%);
}

/* ── CONTENT OVERLAY ── */
#content {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 80px 32px 100px;
}

.top-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
}

.bottom-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

/* ── COLOR VARIABLE ── */
:root { --c: #00CE6B; }

/* ── LOGO ── */
.logo-wrap {
  width: 76%;
  max-width: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-mask {
  width: 100%;
  aspect-ratio: 835 / 700;
  background-color: var(--c);
  -webkit-mask-image: url(../assets/logo.png);
  mask-image: url(../assets/logo.png);
  -webkit-mask-size: contain;
  mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  -webkit-mask-position: center;
  mask-position: center;
  transition: background-color 1s ease;
}

.logo-fallback {
  font-size: 20px;
  font-weight: 900;
  color: var(--c);
  text-align: center;
  line-height: 1.3;
  transition: color 1s ease;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  display: none;
}

/* ── D-DAY ── */
.dday-num {
  font-size: 32px;
  font-weight: 300;
  color: var(--c);
  line-height: 1;
  letter-spacing: -1px;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  transition: color 1s ease;
  text-align: center;
}

/* ── VISITOR COUNT ── */
.visitor-line {
  font-size: 21px;
  font-weight: 400;
  color: var(--c);
  line-height: 1;
  letter-spacing: -0.5px;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  transition: color 1s ease;
  text-align: center;
}

/* ── BASKET BUTTON ── */
.basket-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  text-decoration: none;
}
.basket-btn:active { opacity: 0.75; transform: scale(0.97); }

.basket-mask {
  width: 72px;
  height: 72px;
  background-color: var(--c);
  -webkit-mask-image: url(../assets/basket.png);
  mask-image: url(../assets/basket.png);
  -webkit-mask-size: contain;
  mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  -webkit-mask-position: center;
  mask-position: center;
  transition: background-color 1s ease;
}

.basket-text {
  font-size: 18px;
  font-weight: 900;
  color: var(--c);
  letter-spacing: -0.3px;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  transition: color 1s ease;
}

.basket-progress {
  font-size: 13px;
  font-weight: 600;
  color: var(--c);
  opacity: 0.75;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  transition: color 1s ease;
}
</style>
</head>
<body>
<div id="app">

  <!-- 슬라이드쇼 배경 (5장) -->
  <div class="slide on" id="slide-0"></div>
  <div class="slide" id="slide-1"></div>
  <div class="slide" id="slide-2"></div>
  <div class="slide" id="slide-3"></div>
  <div class="slide" id="slide-4"></div>

  <!-- 메인 콘텐츠 -->
  <div id="content">

    <!-- 상단: 로고 + D-Day + 방문신청 수 -->
    <div class="top-group">
      <div class="logo-wrap">
        <div class="logo-mask" id="logo-mask"></div>
        <div class="logo-fallback" id="logo-fallback">게으러서<br>못열뻔한<br>플리마켓</div>
      </div>
      <div class="dday-num" id="dday-num">D-?</div>
      <div class="visitor-line" id="visitor-line">0명 방문신청</div>
    </div>

    <!-- 하단: 장바구니 버튼 -->
    <div class="bottom-group basket-btn" onclick="goToPrep()">
      <div class="basket-mask"></div>
      <div class="basket-text">내 마켓 준비하기</div>
    </div>

  </div>
</div>

<script>
const EVENT_DATE      = '2026-06-07';
const APPS_SCRIPT_URL = 'TBD';

const COLORS = ['#00CE6B', '#FFF100', '#F95548', '#0BC6FF', '#FFFFFF'];

// 배경 사진 (gmbf/assets/ 폴더에 업로드된 파일명)
const BG_IMAGES = [
  '../assets/bg1.jpeg',
  '../assets/bg2.jpeg',
  '../assets/bg3.jpeg',
  '../assets/bg4.jpeg',
  '../assets/bg5.jpeg',
];

let currentSlide = 0;
let currentColorIdx = -1;
const slideCount = BG_IMAGES.length;


function calcDDay(dateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const event = new Date(dateStr + 'T00:00:00');
  const diff = Math.ceil((event - today) / 86400000);
  if (diff > 0) return 'D-' + diff;
  if (diff === 0) return 'D-Day';
  return 'D+' + Math.abs(diff);
}

function nextColor() {
  let idx;
  do { idx = Math.floor(Math.random() * COLORS.length); }
  while (idx === currentColorIdx);
  currentColorIdx = idx;
  return COLORS[idx];
}

function applyColor(hex) {
  document.documentElement.style.setProperty('--c', hex);
}

function nextSlide() {
  const slides = document.querySelectorAll('.slide');
  slides[currentSlide].classList.remove('on');
  currentSlide = (currentSlide + 1) % slideCount;
  slides[currentSlide].classList.add('on');
  applyColor(nextColor());
}

function initSlides() {
  BG_IMAGES.forEach((url, i) => {
    const el = document.getElementById('slide-' + i);
    if (el) el.style.backgroundImage = 'url(' + url + ')';
  });
}

async function fetchVisitorCount() {
  if (APPS_SCRIPT_URL === 'TBD') return;
  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?action=count');
    const data = await res.json();
    if (data.count !== undefined) {
      document.getElementById('visitor-line').textContent = data.count + '명 방문신청';
    }
  } catch(e) { console.log('방문자 수 불러오기 실패:', e); }
}

function checkLogoLoad() {
  const img = new Image();
  img.onerror = () => {
    document.getElementById('logo-mask').style.display = 'none';
    document.getElementById('logo-fallback').style.display = 'block';
  };
  img.src = '../assets/logo.png';
}

function goToPrep() {
  window.location.href = '../';
}

function init() {
  document.getElementById('dday-num').textContent = calcDDay(EVENT_DATE);
  initSlides();
  checkLogoLoad();
  applyColor(nextColor());
  setInterval(nextSlide, 10000); // 10초마다 전환
  fetchVisitorCount();
  setInterval(fetchVisitorCount, 30000);
}

window.addEventListener('load', init);
</script>
</body>
</html>
