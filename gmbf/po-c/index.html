<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>게으러서 못열뻔한 플리마켓</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--c);
  transition: background-color 1s ease;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

#app {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* ── SLIDESHOW ── */
.slide {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 2s ease-in-out;
  will-change: opacity;
}
.slide.on { opacity: 1; }

.slide::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.65) 100%);
}

/* ── CONTENT OVERLAY ── */
#content {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 80px 32px 100px;
}

.top-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
}

.bottom-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

/* ── COLOR VARIABLE ── */
:root { --c: #00CE6B; }

/* ── 회차 텍스트 ── */
.edition-text {
  font-size: 18px;
  font-weight: 900;
  color: var(--c);
  letter-spacing: -0.3px;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  transition: color 1s ease;
  margin-bottom: -14px; /* 로고와 간격 거의 없게 */
}

/* ── LOGO ── */
.logo-wrap {
  width: 76%;
  max-width: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-mask {
  width: 100%;
  aspect-ratio: 835 / 700;
  background-color: var(--c);
  -webkit-mask-image: url(../assets/logo.png);
  mask-image: url(../assets/logo.png);
  -webkit-mask-size: contain;
  mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  -webkit-mask-position: center;
  mask-position: center;
  transition: background-color 1s ease;
}

.logo-fallback {
  font-size: 20px;
  font-weight: 900;
  color: var(--c);
  text-align: center;
  line-height: 1.3;
  transition: color 1s ease;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  display: none;
}

/* ── D-DAY ── */
.dday-num {
  font-size: 32px;
  font-weight: 300;
  color: var(--c);
  line-height: 1;
  letter-spacing: -1px;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  transition: color 1s ease;
  text-align: center;
}

/* ── VISITOR COUNT ── */
.visitor-line {
  font-size: 21px;
  font-weight: 400;
  color: var(--c);
  line-height: 1;
  letter-spacing: -0.5px;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  transition: color 1s ease;
  text-align: center;
}

/* ── BASKET BUTTON ── */
.basket-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  text-decoration: none;
}
.basket-btn:active { opacity: 0.75; transform: scale(0.97); }

.basket-mask {
  width: 72px;
  height: 72px;
  background-color: var(--c);
  -webkit-mask-image: url(../assets/basket.png);
  mask-image: url(../assets/basket.png);
  -webkit-mask-size: contain;
  mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  -webkit-mask-position: center;
  mask-position: center;
  transition: background-color 1s ease;
}

.basket-text {
  font-size: 18px;
  font-weight: 900;
  color: var(--c);
  letter-spacing: -0.3px;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  transition: color 1s ease;
}

/* ════════════════════════════════
   모달 — 공통 디자인 시스템
   ════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  justify-content: center;
  align-items: center;
  background: rgba(0, 0, 0, 0.4);
}
.modal-overlay.on { display: flex; }

.modal-box {
  width: 82%;
  max-width: 340px;
  padding: 36px 28px 28px;
  border-radius: 0;
  /* 배경색은 JS로 동적 설정 */
  color: #000;
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
}

.modal-title {
  font-size: 20px;
  font-weight: 900;
  color: #000;
  margin-bottom: 10px;
  line-height: 1.3;
  letter-spacing: -0.5px;
}

.modal-desc {
  font-size: 14px;
  color: #000;
  opacity: 0.75;
  margin-bottom: 24px;
  line-height: 1.6;
}

.modal-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 2px solid #000;
  color: #000;
  font-size: 17px;
  font-weight: 600;
  padding: 8px 0;
  outline: none;
  margin-bottom: 28px;
  font-family: inherit;
  letter-spacing: 1px;
}
.modal-input::placeholder { color: rgba(0,0,0,0.35); font-weight: 400; letter-spacing: 0; }

.modal-btns {
  display: flex;
  gap: 10px;
}

.modal-btn {
  flex: 1;
  padding: 12px 0;
  background: transparent;
  border: 2px solid #000;
  border-radius: 0;
  color: #000;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: -0.3px;
  transition: background 0.15s, color 0.15s;
}
.modal-btn:active { background: rgba(0,0,0,0.1); }
</style>
</head>
<body>
<div id="app">

  <!-- 슬라이드쇼 배경 (5장) -->
  <div class="slide on" id="slide-0"></div>
  <div class="slide" id="slide-1"></div>
  <div class="slide" id="slide-2"></div>
  <div class="slide" id="slide-3"></div>
  <div class="slide" id="slide-4"></div>

  <!-- 메인 콘텐츠 -->
  <div id="content">

    <!-- 상단: 회차 + 로고 + D-Day + 방문신청 수 -->
    <div class="top-group">
      <div class="edition-text" id="edition-text">제3회</div>
      <div class="logo-wrap">
        <div class="logo-mask" id="logo-mask"></div>
        <div class="logo-fallback" id="logo-fallback">게으러서<br>못열뻔한<br>플리마켓</div>
      </div>
      <div class="dday-num" id="dday-num">D-?</div>
      <div class="visitor-line" id="visitor-line">0명 방문신청</div>
    </div>

    <!-- 하단: 장바구니 버튼 -->
    <div class="bottom-group basket-btn" onclick="openAuthModal()">
      <div class="basket-mask"></div>
      <div class="basket-text">내 마켓 준비하기</div>
    </div>

  </div>
</div>

<!-- 인증 모달 -->
<div class="modal-overlay" id="auth-modal" onclick="onOverlayClick(event)">
  <div class="modal-box" id="auth-modal-box">
    <div class="modal-title">GMBF 포크이신가요?</div>
    <div class="modal-desc">신청할 때 입력했던 휴대폰 번호로 인증해주세요.</div>
    <input class="modal-input" id="auth-phone" type="tel" placeholder="010-0000-0000" maxlength="13">
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeAuthModal()">취소</button>
      <button class="modal-btn" onclick="confirmAuth()">확인</button>
    </div>
  </div>
</div>

<script>
const EVENT_DATE      = '2026-06-07';
const APPS_SCRIPT_URL = 'TBD';
const EDITION_NUM     = 3; // 관리자 설정 예정

// 메인 색상 순환 (5가지)
const COLORS     = ['#00CE6B', '#FFF100', '#F95548', '#0BC6FF', '#FFFFFF'];
// 모달 배경색 후보 (키컬러 4가지만)
const KEY_COLORS = ['#00CE6B', '#FFF100', '#F95548', '#0BC6FF'];

const BG_IMAGES = [
  '../assets/bg1.jpeg',
  '../assets/bg2.jpeg',
  '../assets/bg3.jpeg',
  '../assets/bg4.jpeg',
  '../assets/bg5.jpeg',
];

let currentSlide    = 0;
let currentColorIdx = -1;
const slideCount    = BG_IMAGES.length;

// ── D-Day ──
function calcDDay(dateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const event = new Date(dateStr + 'T00:00:00');
  const diff  = Math.ceil((event - today) / 86400000);
  if (diff > 0) return 'D-' + diff;
  if (diff === 0) return 'D-Day';
  return 'D+' + Math.abs(diff);
}

// ── 색상 순환 ──
function nextColor() {
  let idx;
  do { idx = Math.floor(Math.random() * COLORS.length); }
  while (idx === currentColorIdx);
  currentColorIdx = idx;
  return COLORS[idx];
}
function applyColor(hex) {
  document.documentElement.style.setProperty('--c', hex);
}

// ── 슬라이드 전환 ──
function nextSlide() {
  const slides = document.querySelectorAll('.slide');
  slides[currentSlide].classList.remove('on');
  currentSlide = (currentSlide + 1) % slideCount;
  slides[currentSlide].classList.add('on');
  applyColor(nextColor());
}

function initSlides() {
  BG_IMAGES.forEach((url, i) => {
    const el = document.getElementById('slide-' + i);
    if (el) el.style.backgroundImage = 'url(' + url + ')';
  });
}

// ── 방문 신청자 수 ──
async function fetchVisitorCount() {
  if (APPS_SCRIPT_URL === 'TBD') return;
  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?action=count');
    const data = await res.json();
    if (data.count !== undefined)
      document.getElementById('visitor-line').textContent = data.count + '명 방문신청';
  } catch(e) { console.log('방문자 수 불러오기 실패:', e); }
}

// ── 로고 fallback ──
function checkLogoLoad() {
  const img = new Image();
  img.onerror = () => {
    document.getElementById('logo-mask').style.display = 'none';
    document.getElementById('logo-fallback').style.display = 'block';
  };
  img.src = '../assets/logo.png';
}

// ════════════════════════════════
//  모달
// ════════════════════════════════

// 현재 --c 와 다른 키컬러를 랜덤 선택
function getModalColor() {
  const current = COLORS[currentColorIdx] || '';
  const available = KEY_COLORS.filter(c => c !== current);
  return available[Math.floor(Math.random() * available.length)];
}

function openAuthModal() {
  const box = document.getElementById('auth-modal-box');
  box.style.background = getModalColor();
  document.getElementById('auth-phone').value = '';
  document.getElementById('auth-modal').classList.add('on');
}

function closeAuthModal() {
  document.getElementById('auth-modal').classList.remove('on');
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('auth-modal')) closeAuthModal();
}

function confirmAuth() {
  const phone = document.getElementById('auth-phone').value.replace(/\D/g, '');
  if (phone.length < 10) {
    alert('올바른 휴대폰 번호를 입력해주세요.');
    return;
  }
  closeAuthModal();
  // 준비 화면으로 이동 (추후 구현)
  window.location.href = './prep.html';
}

// 전화번호 자동 하이픈
document.getElementById('auth-phone').addEventListener('input', function() {
  let v = this.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 7)      this.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7);
  else if (v.length > 3) this.value = v.slice(0,3) + '-' + v.slice(3);
  else                   this.value = v;
});

// ── 초기화 ──
function init() {
  document.getElementById('edition-text').textContent = '제' + EDITION_NUM + '회';
  document.getElementById('dday-num').textContent = calcDDay(EVENT_DATE);
  initSlides();
  checkLogoLoad();
  applyColor(nextColor());
  setInterval(nextSlide, 10000);
  fetchVisitorCount();
  setInterval(fetchVisitorCount, 30000);
}

window.addEventListener('load', init);
</script>
</body>
</html>
