<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — lmp작업실</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main id="main-content">
    <section class="auth-page">
      <div class="auth-card">
        <p style="font-size:1.2rem;font-weight:700;margin-bottom:4px;">로그인</p>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:24px;">lmp작업실 멤버로 로그인해요</p>
        <div class="form-group">
          <label class="form-label" for="nickname">닉네임</label>
          <input class="form-input" type="text" id="nickname" placeholder="닉네임" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input class="form-input" type="password" id="password" placeholder="비밀번호" autocomplete="current-password">
        </div>
        <button class="btn btn--primary" style="width:100%;margin-top:8px;" id="login-btn">로그인</button>
        <p style="text-align:center;margin-top:16px;font-size:0.82rem;color:var(--text-muted);">
          회원 기능은 준비 중이에요 (Phase 6 예정)
        </p>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/main.js"></script>
</body>
</html>
